name: Premier Backend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  backend:
    name: Spring Boot Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: premier_test
          POSTGRES_USER: premier
          POSTGRES_PASSWORD: premier_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U premier -d premier_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/premier_test?sslmode=disable
      DB_USERNAME: premier
      DB_PASSWORD: premier_password
      JPA_DDL_AUTO: none
      SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL: "false"
      SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSLMODE: disable
      JWT_SECRET: ci-passenger-secret-at-least-32-bytes
      JWT_ADMIN_SECRET: ci-admin-secret-at-least-32-bytes
      PAYMONGO_SECRET_KEY: sk_test_ci_placeholder
      PAYMONGO_PUBLIC_KEY: pk_test_ci_placeholder
      PAYMONGO_WEBHOOK_SECRET: ci-webhook-placeholder
      RFID_TERMINAL_TOKEN: ci-rfid-terminal-placeholder
      DRIVER_DEVICE_TOKEN: ci-driver-device-placeholder
      DIALOGFLOW_PROJECT_ID: ci-placeholder
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        run: ./mvnw -B clean package -DskipTests

      - name: Run backend tests
        run: ./mvnw -B test
