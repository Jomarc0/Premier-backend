spring.application.name=Premier System
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# SUPABASE DIRECT CONNECTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP 
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=NAMED

# Passenger JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.temp-expiration=${JWT_TEMP_EXPIRATION:300000}


# Admin JWT
jwt.admin-secret=${JWT_ADMIN_SECRET}
jwt.admin-expiration=${JWT_ADMIN_EXPIRATION:86400000}

# Firebase
firebase.config-path=${FIREBASE_CONFIG_PATH:C:/Users/Jomar/eclipse-workspace/firebase-service-account.json}

# PayMongo
paymongo.secret-key=${PAYMONGO_SECRET_KEY}		
paymongo.public-key=${PAYMONGO_PUBLIC_KEY}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET}
paymongo.base-url=${PAYMONGO_BASE_URL:https://api.paymongo.com/v1}

# TOTP
totp.issuer=${TOTP_ISSUER:PremierTransit}

dialogflow.project-id=${DIALOGFLOW_PROJECT_ID}
dialogflow.language-code=en
dialogflow.credentials-path=${DIALOGFLOW_CREDENTIALS_PATH:C:/Users/Jomar/eclipse-workspace/dialogflow-service-account.json}

# Gemini is used only to improve safe conversational support text.
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

# QR fare tokens
fare.qr-expiration-seconds=${FARE_QR_EXPIRATION_SECONDS:60}
 
chatbot.rate-limit.requests-per-minute=20
management.endpoints.web.exposure.include=health
# Autoconfigure exclusions
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176,http://127.0.0.1:5177,https://premierusers.vercel.app,https://premierrfid.vercel.app,https://premierdriver.vercel.app,https://premieradmin.vercel.app,https://premier-staff.vercel.app
