spring.application.name=Premier System
server.port=${PORT:8080}

# UPABASE DIRECT CONNECTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP 
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=NAMED

# Passenger JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.temp-expiration=${JWT_TEMP_EXPIRATION:300000}


# Admin JWT
jwt.admin-secret=${JWT_ADMIN_SECRET}
jwt.admin-expiration=${JWT_ADMIN_EXPIRATION:86400000}

# Firebase
firebase.config-path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}

# PayMongo
paymongo.secret-key=${PAYMONGO_SECRET_KEY}
paymongo.public-key=${PAYMONGO_PUBLIC_KEY}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET}
paymongo.base-url=${PAYMONGO_BASE_URL:https://api.paymongo.com/v1}

# TOTP
totp.issuer=${TOTP_ISSUER:PremierTransit}

dialogflow.project-id=${DIALOGFLOW_PROJECT_ID}
dialogflow.language-code=en
dialogflow.credentials-path=${DIALOGFLOW_CREDENTIALS_PATH:classpath:dialogflow-service-account.json}
 
chatbot.rate-limit.requests-per-minute=20
management.endpoints.web.exposure.include=health
# Autoconfigure exclusions
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration